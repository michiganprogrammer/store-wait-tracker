name: Log Store Wait Times
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run logger
        run: node index.js
      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wait_times.csv
          git diff --staged --quiet || git commit -m "Update wait times $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
