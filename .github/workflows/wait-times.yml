name: Log Store Wait Times

on:
  schedule:
    # Every 5 min, 13:00–23:55 UTC = 9am–7:55pm EDT (summer)
    # In winter (EST), this becomes 8am–6:55pm. Adjust if needed.
    - cron: '*/5 13-23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run logger
        run: node index.js

      - name: Commit log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wait_times.csv
          git diff --staged --quiet || git commit -m "Update wait times $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
